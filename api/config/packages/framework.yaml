# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        # Permet de créer le cookie PHPSESSID dès la connexion [cite: 2026-01-12]
        handler_id: null
        cookie_secure: auto
        # Crucial : 'lax' permet au cookie d'être envoyé lors de la redirection 
        # depuis React vers l'admin Symfony [cite: 2026-01-12]
        cookie_samesite: lax 
        storage_factory_id: session.storage.factory.native

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
